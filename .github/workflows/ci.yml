name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ">=0.9.15"
          enable-cache: true

      - name: Install project (locked, with dev extras)
        run: |
          uv sync --locked --extra dev

      - name: Run pytest
        run: |
          uv run pytest -v --cov=agent_client_kernel --cov-report=term-missing

  npm-smoke:
    name: Smoke-test pinned npm agent backends
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pinned codex / codex-acp
        run: |
          CODEX_VERSION=$(node -p "require('./package.json').dependencies['@openai/codex']")
          CODEX_ACP_VERSION=$(node -p "require('./package.json').dependencies['@zed-industries/codex-acp']")
          echo "codex=${CODEX_VERSION}  codex-acp=${CODEX_ACP_VERSION}"
          npm install -g "@openai/codex@${CODEX_VERSION}" "@zed-industries/codex-acp@${CODEX_ACP_VERSION}"

      - name: Verify binaries launch
        run: |
          codex --version
          codex-acp --version || codex-acp --help >/dev/null

  docker-build:
    name: Build devcontainer image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: false
          tags: agent-client-kernel:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
