name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ">=0.9.15"
          enable-cache: true

      - name: Install project (locked, with dev extras)
        run: uv sync --locked --extra dev

      - name: Run pytest
        run: uv run pytest -v --cov=agent_client_kernel --cov-report=term-missing

  agent-pins:
    name: Verify pinned ACP agent checksums match upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify pinned SHA-256 checksums
        run: python scripts/update-agent-versions.py --check

      - name: Smoke-test install script (host arch)
        run: |
          PREFIX=$(mktemp -d)
          scripts/install-acp-agents.sh \
              scripts/agent-versions.json "$PREFIX"
          "$PREFIX/bin/codex" --version
          # codex-acp does not implement --version; --help is enough to
          # confirm the binary is launchable.
          "$PREFIX/bin/codex-acp" --help >/dev/null

  docker-build:
    name: Build Codex devcontainer image (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/codex/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: agent-client-kernel:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
