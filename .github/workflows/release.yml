name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name (must match pyproject.toml version, e.g., v0.3.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # create tags and releases
  id-token: write   # PyPI trusted publishing (optional, also keeps token flow working)

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    environment: publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build>=1.2" "hatchling>=1.25" "twine>=5"

      - name: Verify tag matches pyproject version
        run: |
          PYPROJECT_VERSION=$(python -c "import tomllib,sys; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          TAG="${{ inputs.tag_name }}"
          TAG_VERSION="${TAG#v}"
          echo "pyproject version: ${PYPROJECT_VERSION}"
          echo "tag version:        ${TAG_VERSION}"
          if [ "${PYPROJECT_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag ${TAG} does not match pyproject.toml version ${PYPROJECT_VERSION}"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"

      - name: Create and push tag
        run: |
          git tag -a "${{ inputs.tag_name }}" -m "Release ${{ inputs.tag_name }}"
          git push origin "${{ inputs.tag_name }}"

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: Release ${{ inputs.tag_name }}
          files: dist/*
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
