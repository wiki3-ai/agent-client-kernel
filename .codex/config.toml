[model_providers.local_lmstudio]
name = "LM Studio"
# Talk to LM Studio through the in-container lmstudio-shim, which flattens
# Codex 0.130+ "namespace" tool envelopes into plain function tools that
# LM Studio's Responses endpoint accepts. The shim listens on 127.0.0.1:18234
# and forwards to ${HOST_GATEWAY_IP:-host.docker.internal}:1234.
# See scripts/start-lmstudio-shim.sh and agent_client_kernel/lmstudio_shim.py.
base_url = "http://127.0.0.1:18234/v1"
wire_api = "responses"
requires_openai_auth = false
supports_websockets = false
stream_idle_timeout_ms = 300000
request_max_retries = 1
stream_max_retries = 0

[projects."/workspaces/agent-client-kernel"]
trust_level = "trusted"

