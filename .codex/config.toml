# Codex user-level config — gets copied to /home/jovyan/.codex/config.toml
# by the devcontainer Dockerfile. Holds the keys Codex 0.130+ refuses to
# read from a project-local config (profile, profiles, model_providers).
# Project-local overrides (mcp_servers, model_catalog_json, sandbox_mode,
# context window, project trust) live in .codex/config.toml alongside this
# file and are merged in by Codex at load time.

profile = "lmstudio-qwen3-coder"

[mcp_servers.jupyter]
command = "uvx"
args = ["jupyter-mcp-server@latest"]
# uvx may need to download/build the package on first invocation; the
# 30s default trips on cold caches. Bump generously — Codex only waits
# this long once at startup.
startup_timeout_sec = 180
# jupyter-mcp-server >=1.0.0 needs to know where the Jupyter server lives
# and (for v1.0.0+) which MCP_TOKEN the client will present. The devcontainer
# starts jupyter lab on :8888 with `--IdentityProvider.token=''`, so
# JUPYTER_TOKEN is empty. MCP_TOKEN is only enforced for HTTP transport
# (we use stdio) but the server still reads it for its own bookkeeping —
# set a non-empty value to keep it happy.
env = { JUPYTER_URL = "http://localhost:8888", JUPYTER_TOKEN = "", MCP_TOKEN = "local-stdio" }

[mcp_servers.paper-search]
# https://github.com/openags/paper-search-mcp MIT Python
# Install with `pip install paper-search-mcp`
command = "python"
args = ["-m", "paper_search_mcp.server"]

[profiles.lmstudio-qwen3-coder]
model = "qwen/qwen3-coder-next"
model_provider = "local_lmstudio"
model_catalog_json = "/home/jovyan/.codex/model-catalogs/local-lmstudio.json"

# Tune these to the actual LM Studio model settings.
model_context_window = 262144
model_auto_compact_token_limit = 240000

# Local non-OpenAI models usually should not receive OpenAI reasoning metadata.
model_reasoning_summary = "none"
model_supports_reasoning_summaries = false

sandbox_mode = "danger-full-access"
personality = "pragmatic"

[profiles.lmstudio-qwen35]
model = "qwen3.5-27b"
model_provider = "local_lmstudio"
model_catalog_json = "/home/jovyan/.codex/model-catalogs/local-lmstudio.json"

model_context_window = 32768
model_auto_compact_token_limit = 24000

model_reasoning_summary = "none"
model_supports_reasoning_summaries = false

sandbox_mode = "danger-full-access"
personality = "pragmatic"

[profiles.lmstudio-gemma4]
model = "google/gemma-4-26b-a4b"
model_provider = "local_lmstudio"
model_catalog_json = "/home/jovyan/.codex/model-catalogs/local-lmstudio.json"
model_context_window = 32768
model_auto_compact_token_limit = 24000
model_reasoning_summary = "none"
model_supports_reasoning_summaries = false
sandbox_mode = "danger-full-access"

[model_providers.local_lmstudio]
name = "LM Studio"
# Talk to LM Studio through the in-container lmstudio-shim, which flattens
# Codex 0.130+ "namespace" tool envelopes into plain function tools that
# LM Studio's Responses endpoint accepts. The shim listens on 127.0.0.1:18234
# and forwards to ${HOST_GATEWAY_IP:-host.docker.internal}:1234.
# See agent_client_kernel/lmstudio_shim.py.
base_url = "http://127.0.0.1:18234/v1"
wire_api = "responses"
requires_openai_auth = false
supports_websockets = false
stream_idle_timeout_ms = 300000
request_max_retries = 1
stream_max_retries = 0

[projects."/workspaces/agent-client-kernel"]
trust_level = "trusted"
